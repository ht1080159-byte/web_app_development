{% extends 'base.html' %}

{% block title %}註冊 - 英文口說練習系統{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold">建立新帳號 🚀</h2>
                <p class="text-muted">加入我們，開始提升您的口說能力</p>
            </div>
            
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">顯示名稱 (Username)</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="您的名字或暱稱" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">電子郵件 (Email)</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">設定密碼 (Password)</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="至少 6 個字元" minlength="6" required>
                </div>
                
                <div class="d-grid gap-2 mt-2">
                    <button type="submit" class="btn btn-primary premium-btn rounded-pill py-2 fw-bold fs-5">立即註冊</button>
                </div>
            </form>
            
            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted small mb-0">已經有帳號了？ <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold" style="color: var(--primary-color);">直接登入</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
