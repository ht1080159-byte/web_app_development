{% extends 'base.html' %}

{% block title %}登入 - 英文口說練習系統{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold">歡迎回來 👋</h2>
                <p class="text-muted">請登入您的帳號以繼續練習</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">電子郵件 (Email)</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">密碼 (Password)</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <div class="d-grid gap-2 mt-2">
                    <button type="submit" class="btn btn-primary premium-btn rounded-pill py-2 fw-bold fs-5">登入</button>
                </div>
            </form>
            
            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted small mb-0">還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold" style="color: var(--primary-color);">免費註冊</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
